<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f172a" />
    <title>Safeviate Manager Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f172a;
        color: #e2e8f0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .panel {
        width: min(92vw, 420px);
        border: 1px solid rgba(148, 163, 184, 0.25);
        border-radius: 20px;
        padding: 24px;
        background: rgba(15, 23, 42, 0.9);
        box-shadow: 0 20px 60px rgba(15, 23, 42, 0.35);
      }
      h1 {
        margin: 0 0 8px;
        font-size: 20px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: #cbd5e1;
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <h1>Offline</h1>
      <p>The app shell is available, but the page you tried to open has not been cached yet. Reconnect once to load the route and map assets.</p>
    </main>
  </body>
</html>
